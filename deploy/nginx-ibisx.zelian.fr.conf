# Vhost nginx pour IBIS-X — à copier dans /etc/nginx/sites-available/ibisx.zelian.fr
#
#   sudo cp deploy/nginx-ibisx.zelian.fr.conf /etc/nginx/sites-available/ibisx.zelian.fr
#   sudo ln -s /etc/nginx/sites-available/ibisx.zelian.fr /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d ibisx.zelian.fr        # ajoute le bloc 443 + le certificat + la redirection
#
# IBIS-X écoute uniquement sur 127.0.0.1:3200 (conteneur Caddy interne), exactement comme
# work.zelian.fr → 127.0.0.1:8090. nginx termine la TLS et proxifie ; Caddy sépare /api du front.
server {
    server_name ibisx.zelian.fr;

    # Upload de datasets jusqu'à 100 Mo (UPLOAD_MAX_BYTES). Sans ça, nginx bloque dès 1 Mo.
    client_max_body_size 110M;

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (flux d'évènements d'entraînement) : pas de bufferisation, connexion longue.
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    listen 80;
    # Le bloc « listen 443 ssl » + le certificat sont ajoutés automatiquement par Certbot.
}
