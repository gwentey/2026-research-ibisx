# IBIS-X v2 — profil PRODUCTION mono-machine (ARCH §11-13, CDC §12.3).
#   docker compose -f compose.prod.yml up -d --build
# Seul Caddy expose des ports (80/443, TLS automatique) ; tout le reste est interne.
# Voir docs/deploiement-vps.md pour le pas-à-pas complet.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - IBIS_DOMAIN=${IBIS_DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy

  web:
    build:
      context: apps/web
      target: prod
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

  api:
    build: apps/api
    command: sh -c "alembic upgrade head && uvicorn ibis.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO # jamais DEBUG en prod ([NE PAS REPRODUIRE] retro 01/04)
      - DATABASE_URL=postgresql+psycopg://ibis:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}@postgres:5432/ibis
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    volumes:
      - ibis-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: apps/api # MÊME image que l'api (ADR-004)
    command: celery -A ibis.workers.celery_app:celery_app worker -Q training,xai,llm,maintenance -c 2 -B --max-tasks-per-child=10
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+psycopg://ibis:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}@postgres:5432/ibis
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
    volumes:
      - ibis-data:/data
    mem_limit: 4g
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=ibis
      - POSTGRES_USER=ibis
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibis -d ibis"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  ibis-data:
  pg-data:
  redis-data:
  caddy-data:
  caddy-config:
