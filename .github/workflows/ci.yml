# CI IBIS-X v2 (ARCH §12) — bloquante sur chaque PR :
# lint + types + tests (api, web), contrat OpenAPI→client TS à jour, build des images.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ibis
          POSTGRES_USER: ibis
          POSTGRES_PASSWORD: ibis
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ibis"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.10"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy ibis
      - run: uv run pytest -q
        env:
          TEST_DATABASE_URL: postgresql+psycopg://ibis:ibis@localhost:5432/ibis_test
          TEST_REDIS_URL: redis://localhost:6380/9
          DATA_DIR: /tmp/ibis-test-data

  web:
    name: Web — lint, types, tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  contract:
    name: Contrat — client OpenAPI à jour
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.10"
      - run: uv sync --frozen
        working-directory: apps/api
      - name: Export du schéma OpenAPI
        run: uv run python -m ibis.export_openapi ../web/lib/api/openapi.json
        working-directory: apps/api
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: apps/web
      - run: pnpm generate:api
        working-directory: apps/web
      - name: Le client généré doit être commité à jour (ADR-007)
        run: git diff --exit-code -- apps/web/lib/api

  docker:
    name: Docker — build des images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build apps/api -t ibis-api:ci
      - run: docker build apps/web -t ibis-web:ci
