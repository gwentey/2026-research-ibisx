# Catalogue d'import IBIS-X (CDC §5.5.a, §12.5)
# - Les 24 entrées `local_file` sont EMBARQUÉES (vrais datasets UCI / scikit-learn / OpenML,
#   aucun téléchargement ni clé Kaggle requis à l'import) : seed hors-ligne, démontrable.
#   Les 6 premières = seed historique ; les 18 suivantes = lot « plein de datasets »
#   (vrais jeux téléchargés une fois puis embarqués en CSV — voir le bloc plus bas).
# - Les entrées `kaggle_ref` (sans local_file) nécessitent KAGGLE_USERNAME/KAGGLE_KEY.
# Chemins relatifs à ce fichier. Import idempotent : slug déjà présent → ignoré.

